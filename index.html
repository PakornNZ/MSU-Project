<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <title>MSU Sign-in</title>
</head>
<body>
    <div class="signin-container">
        <div class="signin-background">
            <h1>MSU WiFi</h1>
            <button type="button" id="signin-google">
                <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="100" height="100" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>
</body>

<style>

    body {
        --color-main: #2c5dff;
        --color-main-fade: #1d4add;
        --color-white: #ffffff;
        --color-black: #2b2b2b;
        --background: #f8f9fb;
        --shadow: #e6e6e6;
        font-family: "Google Sans", sans-serif;
        position: relative;
        height: 100dvh;
        width: 100dvw;
        margin: 0;
        padding: 0;
        background-color: var(--background);
    }

    .signin-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }

    .signin-background {
        display: flex;
        flex-direction: column;
        background-color: var(--color-white);
        box-shadow: 0 0 6px #e0e0e0dd;
        border-radius: 12px;
        padding: 60px 120px;
        text-align: center;
    }

    .signin-background button {
        all: unset;
        cursor: pointer;
        background-color: var(--background);
        color: var(--color-black);
        font-weight: 500;
        font-size: 16px;
        padding: 10px 20px;
        border-radius: 12px;
        transition: all 0.3s ease-in-out;
    }
    
    .signin-background button:hover {
        background-color: #f8faff;
        transform: scale(1.02);
        /* box-shadow: 0 4px 12px var(--color-white); */
    }

    .signin-background button svg {
        vertical-align: middle;
        margin-right: 10px;
        height: 24px;
        width: 24px;
    }

    h1 {
        margin: 0 0 30px 0;
        color: var(--color-main);
        font-weight: 800;
        font-size: 38px;
    }
</style>

<script>
    const url = 'https://accounts.google.com/o/saml2/initsso?idpid=C00st2wib'
    const signin = document.getElementById('signin-google')
    signin.addEventListener('click', () => {
        window.location.href = 'http://accounts.google.com/Logout?continue=https://appengine.google.com/_ah/logout?continue=' + encodeURIComponent(url)
    })
</script>
</html>
